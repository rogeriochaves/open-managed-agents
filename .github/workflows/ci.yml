name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Run tests (server, web, cli, scenario-skipped)
        # scenario-tests are skipped unless OMA_SCENARIO_ENABLED is set
        # and real OPENAI/ANTHROPIC keys are present, so they're a no-op
        # in CI and do not require any live LLM credentials.
        run: pnpm test

      - name: Build all packages
        run: pnpm build

  sqlite-smoke:
    name: SQLite boot smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Boot server with SQLite + smoke-test the CLI against it
        run: |
          # Start the server in the background on a non-default port to
          # avoid colliding with anything, then drive it with the CLI.
          # Boot with auth disabled for the smoke test — the point
          # of this job is to verify the CLI can drive the API, not
          # to exercise the auth flow (that lives in auth-guard.test.ts).
          AUTH_ENABLED=false \
          OMA_DEFAULT_ADMIN_PASSWORD=ci-test-pw \
          PORT=3099 \
          node packages/server/dist/index.js &
          SERVER_PID=$!

          # Wait for /health to respond (same endpoint the helm probes
          # and the Dockerfile HEALTHCHECK use)
          for i in $(seq 1 30); do
            if curl -sSf -o /dev/null http://localhost:3099/health; then
              echo "Server up"
              break
            fi
            sleep 1
          done

          OMA_API_BASE=http://localhost:3099 ./scripts/cli-smoke-test.sh

          kill $SERVER_PID || true

  postgres-smoke:
    name: Postgres boot smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    # Same flow as sqlite-smoke, but the server boots with DATABASE_URL
    # pointing at a real postgres service container. This exercises the
    # dialect-aware schema (translateSql $1..$N placeholders, INSERT ON
    # CONFLICT, CURRENT_TIMESTAMP defaults) end-to-end — the unit tests
    # for translateSql cover the function in isolation but nothing else
    # actually boots the server on postgres.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: oma-ci
          POSTGRES_USER: oma
          POSTGRES_DB: oma
        ports:
          - 5432:5432
        # Wait until pg_isready reports the instance is accepting
        # connections before the job's own steps start.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Boot server with Postgres + smoke-test the CLI against it
        env:
          DATABASE_URL: postgres://oma:oma-ci@localhost:5432/oma
          AUTH_ENABLED: "false"
          OMA_DEFAULT_ADMIN_PASSWORD: ci-test-pw
          PORT: "3099"
        run: |
          # Capture the server log so we can assert the postgres
          # adapter was actually picked.
          node packages/server/dist/index.js > /tmp/oma-server.log 2>&1 &
          SERVER_PID=$!

          for i in $(seq 1 30); do
            if curl -sSf -o /dev/null http://localhost:3099/health; then
              echo "Server up"
              break
            fi
            sleep 1
          done

          # Fail loudly if the server silently fell back to SQLite.
          # The adapter logs "Database: postgres" or "Database: sqlite ..."
          # on boot — we need to see the postgres line to know the
          # translateSql path is actually exercised.
          if ! grep -q "Database: postgres" /tmp/oma-server.log; then
            echo "✗ Server did not boot on the postgres adapter"
            echo "--- server log ---"
            cat /tmp/oma-server.log
            exit 1
          fi
          echo "✓ Server booted on the postgres adapter"

          OMA_API_BASE=http://localhost:3099 ./scripts/cli-smoke-test.sh

          kill $SERVER_PID || true

  helm:
    name: Helm chart lint + render
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.3

      - name: Lint the chart
        run: helm lint helm/open-managed-agents

      - name: Render with default values (embedded postgres)
        run: helm template oma-ci helm/open-managed-agents > /tmp/out-postgres.yaml

      - name: Render with sqlite
        run: |
          helm template oma-ci helm/open-managed-agents \
            --set database.type=sqlite > /tmp/out-sqlite.yaml

      - name: Render with external postgres URL
        run: |
          helm template oma-ci helm/open-managed-agents \
            --set database.type=postgres \
            --set database.postgres.embedded=false \
            --set database.postgres.url="postgres://u:p@external:5432/oma" \
            > /tmp/out-external.yaml

      - name: Smoke-check rendered manifests
        run: |
          # Each mode should produce at least one Deployment and one Service
          for f in /tmp/out-postgres.yaml /tmp/out-sqlite.yaml /tmp/out-external.yaml; do
            if ! grep -q "^kind: Deployment" "$f"; then
              echo "✗ $f is missing a Deployment"
              exit 1
            fi
            if ! grep -q "^kind: Service" "$f"; then
              echo "✗ $f is missing a Service"
              exit 1
            fi
          done

          # postgres (embedded) → StatefulSet present
          grep -q "^kind: StatefulSet" /tmp/out-postgres.yaml \
            || (echo "✗ embedded postgres mode missing StatefulSet"; exit 1)

          # sqlite → PVC for data volume present
          grep -q "^kind: PersistentVolumeClaim" /tmp/out-sqlite.yaml \
            || (echo "✗ sqlite mode missing PVC"; exit 1)

          # external postgres → DATABASE_URL wired into the Secret
          grep -q "DATABASE_URL" /tmp/out-external.yaml \
            || (echo "✗ external postgres mode missing DATABASE_URL"; exit 1)

          echo "All helm render modes look correct."

  docker-compose:
    name: docker-compose config validation
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write an empty .env so env_file resolves
        run: touch .env

      - name: Validate docker-compose.yml parses
        # -q silences output so secrets (if any) never land in CI logs
        run: docker compose -f docker-compose.yml config -q

      - name: Assert expected services are declared
        run: |
          SERVICES=$(docker compose -f docker-compose.yml config --services | sort)
          echo "services: $SERVICES"
          for expected in postgres server web; do
            if ! echo "$SERVICES" | grep -qx "$expected"; then
              echo "✗ docker-compose.yml is missing service: $expected"
              exit 1
            fi
          done
          echo "All expected services present."
