{{- if and (eq .Values.database.type "postgres") .Values.database.postgres.embedded }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "oma.fullname" . }}-postgres
  labels:
    {{- include "oma.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "oma.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "oma.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "oma.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.database.postgres.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.database.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.database.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.database.postgres.database | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.postgres.user }}
                - -d
                - {{ .Values.database.postgres.database }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.postgres.user }}
                - -d
                - {{ .Values.database.postgres.database }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.database.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.database.postgres.storageClassName }}
        storageClassName: {{ .Values.database.postgres.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.postgres.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "oma.fullname" . }}-postgres
  labels:
    {{- include "oma.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    {{- include "oma.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
