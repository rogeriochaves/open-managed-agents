{{- if not .Values.server.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oma.fullname" . }}-secret
  labels:
    {{- include "oma.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.server.env.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.server.env.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.server.env.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.server.env.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.server.env.vaultEncryptionKey }}
  VAULT_ENCRYPTION_KEY: {{ .Values.server.env.vaultEncryptionKey | quote }}
  {{- end }}
{{- end }}
