{{- $usePostgres := eq .Values.database.type "postgres" -}}
{{- $useSqlite := eq .Values.database.type "sqlite" -}}
{{- $embeddedPostgres := and $usePostgres .Values.database.postgres.embedded -}}
{{- $externalPostgres := and $usePostgres (not .Values.database.postgres.embedded) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oma.fullname" . }}-server
  labels:
    {{- include "oma.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicas }}
  {{- if and $useSqlite .Values.persistence.enabled (eq (int .Values.server.replicas) 1) }}
  # SQLite requires exclusive file access — Recreate avoids two pods
  # holding the same DB file during a rolling update.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "oma.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print .Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/governance: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "oma.server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if $embeddedPostgres }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "oma.fullname" . }}-postgres 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
      {{- end }}
      containers:
        - name: server
          image: {{ include "oma.server.image" . }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.server.port | quote }}
            {{- if $useSqlite }}
            - name: DATABASE_PATH
              value: /data/oma.db
            {{- end }}
            {{- if $embeddedPostgres }}
            - name: DATABASE_URL
              value: postgres://{{ .Values.database.postgres.user }}:{{ .Values.database.postgres.password }}@{{ include "oma.fullname" . }}-postgres:5432/{{ .Values.database.postgres.database }}
            {{- end }}
            {{- if $externalPostgres }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "oma.secretName" . }}
                  key: DATABASE_URL
                  optional: false
            {{- end }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "oma.secretName" . }}
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "oma.secretName" . }}
                  key: OPENAI_API_KEY
                  optional: true
            - name: VAULT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "oma.secretName" . }}
                  key: VAULT_ENCRYPTION_KEY
                  optional: true
            {{- range $key, $value := .Values.server.env.extra }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.governance.enabled }}
            - name: GOVERNANCE_CONFIG
              value: /etc/oma/governance.json
            {{- end }}
          {{- if or (and $useSqlite .Values.persistence.enabled) .Values.governance.enabled }}
          volumeMounts:
            {{- if and $useSqlite .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.governance.enabled }}
            - name: governance
              mountPath: /etc/oma
              readOnly: true
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
      {{- if or (and $useSqlite .Values.persistence.enabled) .Values.governance.enabled }}
      volumes:
        {{- if and $useSqlite .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "oma.pvcName" . }}
        {{- end }}
        {{- if .Values.governance.enabled }}
        - name: governance
          configMap:
            name: {{ include "oma.fullname" . }}-governance
        {{- end }}
      {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
