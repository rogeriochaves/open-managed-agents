apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oma.fullname" . }}-server
  labels:
    {{- include "oma.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicas }}
  {{- if and .Values.persistence.enabled (eq (int .Values.server.replicas) 1) }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "oma.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print .Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/governance: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "oma.server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          image: {{ include "oma.server.image" . }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.server.port | quote }}
            - name: DATABASE_PATH
              value: /data/oma.db
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "oma.secretName" . }}
                  key: ANTHROPIC_API_KEY
                  optional: false
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "oma.secretName" . }}
                  key: OPENAI_API_KEY
                  optional: true
            - name: VAULT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "oma.secretName" . }}
                  key: VAULT_ENCRYPTION_KEY
                  optional: true
            {{- range $key, $value := .Values.server.env.extra }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.governance.enabled }}
            - name: GOVERNANCE_CONFIG_PATH
              value: /etc/oma/governance.yaml
            {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.governance.enabled }}
            - name: governance
              mountPath: /etc/oma
              readOnly: true
            {{- end }}
          {{- else if .Values.governance.enabled }}
          volumeMounts:
            - name: governance
              mountPath: /etc/oma
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
      {{- if or .Values.persistence.enabled .Values.governance.enabled }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "oma.pvcName" . }}
        {{- end }}
        {{- if .Values.governance.enabled }}
        - name: governance
          configMap:
            name: {{ include "oma.fullname" . }}-governance
        {{- end }}
      {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
