server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the server
    location /v1/ {
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE needs streaming — disable buffering and caching
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # Proxy the health endpoint so external monitors get the real
    # backend status (without this, nginx's SPA fallback would hand
    # back index.html with 200 — misleading for uptime checks).
    location = /health {
        proxy_pass http://server:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy Swagger UI + OpenAPI spec
    location = /docs {
        proxy_pass http://server:3001/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /openapi.json {
        proxy_pass http://server:3001/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
