<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="oma-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF3E4"/>
      <stop offset="100%" stop-color="#FFD19B"/>
    </linearGradient>
    <linearGradient id="oma-accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF9E2C"/>
      <stop offset="100%" stop-color="#ED8926"/>
    </linearGradient>
    <linearGradient id="oma-node" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF9E2C"/>
      <stop offset="100%" stop-color="#dd6b20"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#oma-bg)" stroke="url(#oma-accent)" stroke-width="1.5"/>

  <!-- Network edges connecting nodes -->
  <g stroke="url(#oma-accent)" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
    <line x1="32" y1="32" x2="18" y2="18"/>
    <line x1="32" y1="32" x2="46" y2="18"/>
    <line x1="32" y1="32" x2="18" y2="46"/>
    <line x1="32" y1="32" x2="46" y2="46"/>
    <line x1="18" y1="18" x2="46" y2="18"/>
    <line x1="46" y1="18" x2="46" y2="46"/>
    <line x1="46" y1="46" x2="18" y2="46"/>
    <line x1="18" y1="46" x2="18" y2="18"/>
  </g>

  <!-- Corner nodes (agents) -->
  <circle cx="18" cy="18" r="4.5" fill="url(#oma-node)" opacity="0.9"/>
  <circle cx="46" cy="18" r="4.5" fill="url(#oma-node)" opacity="0.9"/>
  <circle cx="18" cy="46" r="4.5" fill="url(#oma-node)" opacity="0.9"/>
  <circle cx="46" cy="46" r="4.5" fill="url(#oma-node)" opacity="0.9"/>

  <!-- Center orchestrator node -->
  <circle cx="32" cy="32" r="7.5" fill="url(#oma-node)"/>
  <circle cx="32" cy="32" r="3.5" fill="#FFFFFF"/>
  <circle cx="32" cy="32" r="2" fill="url(#oma-accent)"/>

  <!-- Small accent dots -->
  <circle cx="25" cy="25" r="1.5" fill="#FF9E2C" opacity="0.7"/>
  <circle cx="39" cy="25" r="1.5" fill="#FF9E2C" opacity="0.7"/>
  <circle cx="25" cy="39" r="1.5" fill="#FF9E2C" opacity="0.7"/>
  <circle cx="39" cy="39" r="1.5" fill="#FF9E2C" opacity="0.7"/>
</svg>
